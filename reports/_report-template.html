<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PROJECT}} — Status {{DATE}}</title>
<!--
  STATUS REPORT VIEW — template skeleton.

  The agent fills the {{TOKENS}} below from a status report and writes a SELF-CONTAINED
  sibling file (e.g. 2026-06-25-status.html) next to the report's .md.

  Rules:
    - The .md report is the source of truth; this .html is a generated VIEW.
      Never hand-edit a generated report .html — regenerate it from the .md.
    - Keep everything inline (no external files) so it opens on double-click and travels as one file.
    - Edit THIS skeleton to restyle every future report at once.

  How to fill the tokens:
    {{PROJECT}} {{DATE}} — plain text from the report header.
    {{NEEDS_ATTENTION}} — leave empty if no item has 2+ slips; otherwise:
        <section class="attention"><h2>Needs attention</h2>
          <ul><li><strong>M2 · Provision API keys</strong> — <span class="slip-flag">2 slips</span>: …</li></ul>
        </section>
    {{BODY}} — one <h2> per milestone, each followed by a <table> of its items.
        Columns: Item · Owner · Due Date · Outcome · Status · Slips · Validation
        Wrap status text:  <span class="status open|in-progress|blocked|closed">…</span>
        Wrap a 2+ slip count: <span class="slip-flag">…</span>
-->
<style>
  :root { --ink:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --bg:#fff;
          --flag:#b91c1c; --flag-bg:#fef2f2; --flag-line:#fecaca;
          --closed:#16a34a; --blocked:#b91c1c; --inprog:#2563eb; --open:#6b7280; }
  * { box-sizing:border-box; }
  body { font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         color:var(--ink); background:#f3f4f6; margin:0; padding:32px; }
  .page { max-width:920px; margin:0 auto; background:var(--bg); padding:40px 44px;
          border:1px solid var(--line); border-radius:10px; }
  header { border-bottom:2px solid var(--ink); padding-bottom:16px; margin-bottom:24px; }
  h1 { font-size:22px; margin:0 0 6px; }
  .meta { color:var(--muted); font-size:13px; }
  h2 { font-size:16px; margin:28px 0 10px; }
  table { width:100%; border-collapse:collapse; margin:8px 0 22px; font-size:14px; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .status { font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  .status.closed{color:var(--closed)} .status.blocked{color:var(--blocked)}
  .status.in-progress{color:var(--inprog)} .status.open{color:var(--open)}
  .attention { background:var(--flag-bg); border:1px solid var(--flag-line); border-radius:8px;
               padding:14px 18px; margin-bottom:8px; }
  .attention h2 { color:var(--flag); margin:0 0 6px; }
  .slip-flag { color:var(--flag); font-weight:600; }
  footer { margin-top:28px; padding-top:14px; border-top:1px solid var(--line);
           color:var(--muted); font-size:12px; }
  @media print { body{background:#fff;padding:0} .page{border:0;border-radius:0} }
</style>
</head>
<body>
  <div class="page">
    <header>
      <h1>{{PROJECT}}</h1>
      <div class="meta"><span><strong>Status as of:</strong> {{DATE}}</span></div>
    </header>

    {{NEEDS_ATTENTION}}

    {{BODY}}

    <footer>Generated view of the project's status report. Source of truth is the project tracker.</footer>
  </div>
</body>
</html>
